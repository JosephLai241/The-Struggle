[package]
authors = ["Joseph Lai <jlai24142@gmail.com>"]
categories = ["command-line-utilities"]
description = "A command-line tool for tracking your job applications"
edition = "2021"
homepage = "https://github.com/JosephLai241/fetters"
keywords = ["cli", "command-line tool", "job application", "sqlite", "tracking"]
license = "MIT"
name = "fetters"
readme = "README.md"
repository = "https://github.com/JosephLai241/fetters"
version = "3.0.0"

[[bin]]
name = "fetters"
path = "src/main.rs"

[dependencies]
ansi_term = "0.12.1"
clap = { version = "4.3.19", features = ["derive"] }
config = "0.13.3"
directories = "5.0.1"
lazy_static = "1.4.0"
rusqlite = { version = "0.29.0", features = ["bundled"] }
serde = { version = "1.0.180", features = ["derive"] }
term-table = "1.3.2"
terminal-link = "0.1.0"
thiserror = "1.0.44"
